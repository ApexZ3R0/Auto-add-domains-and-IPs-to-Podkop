# podkop-monitor.conf — конфигурация podkop-monitor
# Размещается в /etc/podkop-monitor/podkop-monitor.conf
# Все скрипты читают этот файл при запуске.
# После изменения перезапуск не нужен — читается при каждом вызове.

# ── Сеть ──────────────────────────────────────────────────────────────────────

# WAN-интерфейс с белым IP (через него идут curl-проверки)
# Важно: именно этот интерфейс используется для probe, чтобы не путать
# с VPN-трафиком устройств в домашней сети
WAN_IFACE="eth1"

# SSH-цель зарубежного VPS для ping-проверки
# Формат: user@host или user@ip
VPS_HOST="root@vps"

# Доверенный DNS для резолвинга при VPS ping-проверке
DNS_TRUSTED="8.8.8.8"

# ── Пороги ────────────────────────────────────────────────────────────────────

# Сколько последовательных неудач curl через WAN до запуска VPS-проверки
FAIL_THRESHOLD="3"

# Сколько ночей подряд ресурс должен быть доступен напрямую для удаления
# из списка обхода (защита от флуктуаций)
CLEAN_THRESHOLD="3"

# Таймаут curl в секундах
CURL_TIMEOUT="8"

# Таймаут SSH-сессии для VPS ping
VPS_SSH_TIMEOUT="15"
SSH_KEY="/root/.ssh/id_rsa"

# ── podkop ────────────────────────────────────────────────────────────────────

# Имя секции podkop в UCI, куда добавляются домены/IP
PODKOP_SECTION="MY_VPN_SECTION"

# ── Пути ─────────────────────────────────────────────────────────────────────

# Рабочая директория (state.db, manual.txt, candidates.d/)
BASE_DIR="/etc/podkop-monitor"
